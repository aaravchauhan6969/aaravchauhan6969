<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
  margin: 0px;
  padding: 0px;

}
.header{
    background-color: black;
    height: 60px;
    display: flex;
    justify-content: space-between;
}
.logo img{
    height: 30px;
    padding-top: 15px;
    padding-left: 20px;
}
.centre{
    display: flex;
    gap: 10px;
    margin-left: 150px;
}
.home{
    width: 50px;
    margin-left: 150px;
    margin-top: 7px;
    margin-bottom: 7px;
    background-color:#2a2a2a;
    border: black 2px;
    border-radius: 100%;
    
    
}
.home img{
    margin-top: 5px;
    margin-left: 7px;
    
    
}
.search{
padding-top: 5px;
position: relative;
}
.searchicon{
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    height: 30px;
    opacity: 0.7;
}


#search{
    background-color: #2a2a2a;   
    color: white;              
    border: 1px solid #555;
    border-radius: 100px;    
    padding: 8px 15px 8px 45px;
    outline: none;   
    height: 30px; 
    width: 200px;          
}
#search::placeholder{
    color: rgb(165, 164, 164);
    font-size: 15px;

}
.List{
    display: flex;
    justify-content: space-between;
    gap: 50px;
}
.list1 ul{
    color: white;
    list-style-type: none;
    display: flex;
    gap: 20px;
    margin-top: 20px;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    font-size: 17px;
}
.list3 ul{
    color: white;
    list-style-type: none;
    display: flex;
    gap: 20px;
    padding-right: 20px;
    margin-top: 20px;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    font-size: 17px;

    
}

#login{
    background-color: white;
    color: black;
    padding: 8px 20px 8px 20px;
    border: white 2px;
    border-radius: 100px;
    
}.aarav{
    background-color: black;
}
.side{
    background-color:#1a1818 ;
    height: 1000px;
    width: 500px;
    border: black 2px;
    border-radius: 10px;
    margin-left: 5px;
    display: flex;
    justify-content: space-between;
}

.side1{
    color: white;
    padding: 20px;
}
    </style>
</head>
<body>
    <header>
        <div class="header">
            <div class="logo">
                <img src="Logo.png" alt="Spotify Logo">
            </div>
            <div class="centre">
                <div class="home">
                <a href="index.html">
                <img src="Home.png" alt="home icon">
                </a>
                
            </div>
            <div class="search">
                <img src="searchicon.png" alt="search icon" class="searchicon">
                <input type="text" id="search" placeholder="What do you want to play ?">
            </div>
            </div>
            
            
            <div class="List">
            <div class="list1">
                <ul>
                    <li>Premium</li>
                    <li>Support</li>
                    <li>Download</li>
                </ul>
            </div>
            <div class="list3">
                <ul>
                    <li>Install App</li>
                    <li> Sign up</li>
                    <li id="login">Log in</li>
                </ul>
            </div>
            </div>
        </div>
    </header>
    <main>
        <section class="aarav">
            <div class="side">
                <div class="side1">
                    <p>Your Library</p>
                </div>
                <div class="side2">
                    <p>+ Create</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
